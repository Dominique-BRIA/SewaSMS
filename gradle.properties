# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check build.gradle files instead.
# When configured from the IDE, Gradle will place these settings in the local
# properties file. IDE will honor the properties set there.

# Project settings
org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official

# Build settings
android.enableDexingArtifactTransform=true
android.useNewApkCreator=true

# Deployment settings
android.enableMinifyWithR8=true
